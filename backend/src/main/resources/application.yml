server:
  port: 8080

spring:
  application:
    name: ecommerce-backend

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: ecommerce
    password: ecommerce123
    virtual-host: /
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 驼峰命名映射
    map-underscore-to-camel-case: true
    # 控制台打印 SQL（开发环境开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存配置
    cache-enabled: false
  global-config:
    db-config:
      # 数据库主键自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 密钥（至少 32 字符）
  secret: EcommerceSecretKey2024MustBeAtLeast256BitsLong!!
  # Token 过期时间（24 小时，单位毫秒）
  expiration: 86400000

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# AI 服务地址（Python Flask）
ai:
  service:
    url: http://localhost:5002

# 日志配置
logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
